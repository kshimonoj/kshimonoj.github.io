  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>

    <div class="nav-inner">

      <div class="nav-links">

        <a href="https://github.com/kshimonoj" target="_blank" rel="noopener">

        </a>
      </div>
    </div>
  </nav>

  <main>
    {{ content }}

  <footer class="site-footer">
    <p>© 2026 Keita Shimono ·
      <a href="https://github.com/kshimonoj">github.com/kshimonoj</a>

</html>
