---
layout: default
---
<article class="post">
  <header class="post-header">
    <div class="blog-meta">
      <span class="blog-date">{{ page.date | date: "%Y-%m-%d" }}</span>
      {% if page.category %}
      <span class="blog-category cat-{{ page.category }}">{{ site.data.categories[page.category].label }}</span>
      {% endif %}
    </div>
    <h1>{{ page.title }}</h1>
  </header>
  <div class="post-body">
    {{ content }}
  </div>
  <p style="margin-top:2rem;"><a href="{{ '/blog' | relative_url }}">← ブログ一覧へ</a></p>
</article>
